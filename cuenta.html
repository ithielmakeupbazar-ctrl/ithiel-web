<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Cuenta opcional y perfil simple de clientes de Ithiel Bazar y Makeup.">
  <title>Mi cuenta | Ithiel</title>
  <style>
    :root{--rose:#b91658;--deep:#780a38;--ink:#321522;--green:#16804b;--line:#e4b5c8;}
    *{box-sizing:border-box} body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;color:var(--ink);font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at 14% 0%,#ffb2cb 0,transparent 27%),linear-gradient(125deg,#5e062d,#bd1659 55%,#f26b9d)}
    main{width:min(100%,490px);padding:32px;border-radius:20px;background:#fff;box-shadow:0 20px 60px #3215224d} h1{margin:0;color:var(--deep);text-align:center;font-size:31px;letter-spacing:2px;font-weight:700} p{color:#765763;line-height:1.45;text-align:center}.back{display:inline-flex;align-items:center;margin-bottom:18px;padding:7px 10px;border:1px solid var(--line);border-radius:999px;color:var(--deep);background:#fff8fb;font-size:13px;font-weight:600;text-decoration:none}.back:hover{background:#f8e4ec}
    label{display:grid;gap:6px;margin:15px 0;color:#765763;font-size:13px;font-weight:600}input,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:12px;color:var(--ink);font:inherit;background:#fff}textarea{min-height:76px;resize:vertical}.phone{display:grid;grid-template-columns:auto 1fr;border:1px solid var(--line);border-radius:9px;overflow:hidden}.phone span{display:grid;place-items:center;padding:0 11px;color:var(--deep);background:#f8e4ec;font-size:14px;font-weight:600}.phone input{border:0;border-radius:0}
    button{display:flex;width:100%;align-items:center;justify-content:center;gap:8px;border:0;border-radius:10px;padding:13px;color:#fff;background:var(--rose);cursor:pointer;font:inherit;font-size:14px;font-weight:600}button:hover{background:var(--deep)}.google,.secondary{margin:12px 0;color:#3b2a31;border:1px solid #d9c4ce;background:#fff}.secondary{color:var(--deep)}.row{display:grid;grid-template-columns:1fr 1fr;gap:9px}.row button{margin:0}.logout{margin-top:12px;background:#fff;color:var(--deep);border:1px solid var(--line)}.consent{display:flex;gap:8px;align-items:flex-start;font-weight:400;line-height:1.35}.consent input{width:auto;margin-top:2px}.message{min-height:20px;margin:13px 0 0;font-size:13px}.account-email{padding:10px 12px;border-radius:9px;color:var(--deep);background:#f8e4ec;text-align:center;font-size:14px;font-weight:600}[hidden]{display:none!important}.icon{width:19px;height:19px;flex:0 0 19px}
  </style>
</head>
<body>
  <main>
    <a class="back" href="/">Catálogo</a>
    <section id="access-view">
      <h1>MI CUENTA</h1>
      <p>Ingresá para guardar y actualizar tus datos. Comprar desde el catálogo sigue siendo opcional.</p>
      <button id="google-login" class="google" type="button"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M21.6 12.23c0-.71-.06-1.23-.2-1.77H12v3.37h5.52c-.11.84-.7 2.1-2.01 2.95l-.02.11 2.92 2.26.2.02c1.84-1.7 2.99-4.2 2.99-6.94Z"/><path fill="#34A853" d="M12 22c2.7 0 4.97-.89 6.63-2.42l-3.16-2.4c-.85.59-1.99 1-3.47 1-2.65 0-4.9-1.74-5.7-4.16l-.1.01-3.03 2.35-.03.1A10 10 0 0 0 12 22Z"/><path fill="#FBBC05" d="M6.3 14.02A5.98 5.98 0 0 1 5.98 12c0-.7.12-1.37.31-2.02v-.13L3.23 7.47l-.1.05A10 10 0 0 0 2 12c0 1.61.38 3.14 1.13 4.47l3.17-2.45Z"/><path fill="#EA4335" d="M12 5.82c1.87 0 3.13.8 3.85 1.47l2.81-2.74C16.96 2.96 14.7 2 12 2a10 10 0 0 0-8.87 5.47l3.16 2.51C7.1 7.56 9.35 5.82 12 5.82Z"/></svg>Continuar con Google</button>
      <form id="email-form">
        <label>Email<input id="email" type="email" autocomplete="email" required></label>
        <label>Contraseña<input id="password" type="password" autocomplete="current-password" minlength="6" required></label>
        <div class="row"><button type="submit">Ingresar</button><button id="signup" class="secondary" type="button">Crear cuenta</button></div>
      </form>
      <p id="access-message" class="message" aria-live="polite"></p>
    </section>

    <section id="profile-view" hidden>
      <h1>MI PERFIL</h1>
      <p class="account-email" id="account-email"></p>
      <button id="edit-profile" class="secondary" type="button">Editar datos de compra</button>
      <form id="profile-form" hidden>
        <label>Nombre y apellido<input id="full-name" maxlength="100" autocomplete="name" required></label>
        <label>WhatsApp <small>(opcional)</small><div class="phone"><span>+54 9</span><input id="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="341 123 4567"></div></label>
        <label>Dirección <small>(opcional)</small><textarea id="address" autocomplete="street-address" maxlength="250" placeholder="Calle, número, piso/depto y localidad"></textarea></label>
        <label class="consent"><input id="optin" type="checkbox"> Quiero recibir novedades y ofertas por WhatsApp.</label>
        <button type="submit">Guardar cambios</button>
        <button id="back-profile" class="secondary" type="button">Volver</button>
      </form>
      <button id="change-password" class="secondary" type="button">Recibir email para cambiar contraseña</button>
      <form id="password-form" hidden>
        <label>Nueva contraseña<input id="new-password" type="password" autocomplete="new-password" minlength="6" required></label>
        <button type="submit">Guardar nueva contraseña</button>
      </form>
      <button id="logout" class="logout" type="button">Cerrar sesión</button>
      <p id="profile-message" class="message" aria-live="polite"></p>
    </section>
  </main>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
    const SUPABASE_URL="https://bfuexiblfuqwykktltrp.supabase.co";
    const SUPABASE_ANON_KEY="sb_publishable_8-do7RGW8-li-7d1BnAsXQ_RYsks6iy";
    const REGISTER_URL=`${SUPABASE_URL}/functions/v1/register-customer-v2`;
    const supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    const accessView=document.querySelector("#access-view"),profileView=document.querySelector("#profile-view"),accessMessage=document.querySelector("#access-message"),profileMessage=document.querySelector("#profile-message");
    const message=(node,text,color="#765763")=>{node.textContent=text;node.style.color=color};
    async function profileRequest(body){const {data:{session}}=await supabase.auth.getSession();if(!session)throw new Error("Tu sesión venció.");const res=await fetch(REGISTER_URL,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${session.access_token}`},body:JSON.stringify(body)});const data=await res.json();if(!res.ok)throw new Error(data.error||"No se pudieron guardar los datos.");return data;}
    function localPhone(value){let n=String(value||"").replace(/\D/g,"");if(n.startsWith("549"))n=n.slice(3);else if(n.startsWith("54"))n=n.slice(2);if(n.startsWith("9"))n=n.slice(1);return n;}
    function applyProfile(session,profile){const fallback=session.user.user_metadata?.full_name||session.user.user_metadata?.name||"";document.querySelector("#full-name").value=profile?.full_name||fallback;document.querySelector("#phone").value=localPhone(profile?.phone);document.querySelector("#address").value=profile?.default_address||"";document.querySelector("#optin").checked=Boolean(profile?.whatsapp_opt_in);}
    async function showProfile(session){accessView.hidden=true;profileView.hidden=false;document.querySelector("#account-email").textContent=`✓ ${session.user.email||"Cuenta conectada"}`;applyProfile(session,null);}
    document.querySelector("#google-login").addEventListener("click",async()=>{message(accessMessage,"Abriendo Google…");const {data,error}=await supabase.auth.signInWithOAuth({provider:"google",options:{redirectTo:`${location.origin}/cuenta`}});if(error)return message(accessMessage,"No se pudo iniciar con Google.","#a25119");if(data?.url)location.assign(data.url);});
    document.querySelector("#email-form").addEventListener("submit",async(e)=>{e.preventDefault();message(accessMessage,"Ingresando…");const {error}=await supabase.auth.signInWithPassword({email:document.querySelector("#email").value.trim(),password:document.querySelector("#password").value});if(error)message(accessMessage,"Email o contraseña incorrectos.","#a25119");});
    document.querySelector("#signup").addEventListener("click",async()=>{const email=document.querySelector("#email").value.trim(),password=document.querySelector("#password").value;if(!email||password.length<6)return message(accessMessage,"Ingresá email y una contraseña de al menos 6 caracteres.","#a25119");message(accessMessage,"Creando cuenta…");const {data,error}=await supabase.auth.signUp({email,password,options:{emailRedirectTo:`${location.origin}/cuenta`}});if(error)return message(accessMessage,error.message,"#a25119");message(accessMessage,data.session?"Cuenta creada. Completá tu perfil.":"Cuenta creada. Revisá tu email para confirmarla.","#16804b");});
    document.querySelector("#edit-profile").addEventListener("click",async()=>{const button=document.querySelector("#edit-profile");button.hidden=true;document.querySelector("#profile-form").hidden=false;message(profileMessage,"Cargando datos…");try{const {data:{session}}=await supabase.auth.getSession();const result=await profileRequest({action:"getProfile"});applyProfile(session,result.data);message(profileMessage,"");}catch(error){message(profileMessage,"Podés completar tus datos y guardarlos.","#a25119");}});
    document.querySelector("#profile-form").addEventListener("submit",async(e)=>{e.preventDefault();message(profileMessage,"Guardando…");try{await profileRequest({fullName:document.querySelector("#full-name").value.trim(),phone:document.querySelector("#phone").value,address:document.querySelector("#address").value.trim(),whatsappOptIn:document.querySelector("#optin").checked,website:""});message(profileMessage,"Cambios guardados.","#16804b");}catch(error){message(profileMessage,error.message,"#a25119");}});
    document.querySelector("#back-profile").addEventListener("click",()=>{document.querySelector("#profile-form").hidden=true;document.querySelector("#edit-profile").hidden=false;message(profileMessage,"");});
    document.querySelector("#change-password").addEventListener("click",async()=>{const {data:{session}}=await supabase.auth.getSession();const {error}=await supabase.auth.resetPasswordForEmail(session.user.email,{redirectTo:`${location.origin}/cuenta`});message(profileMessage,error?error.message:"Te enviamos un email para cambiar tu contraseña.",error?"#a25119":"#16804b");});
    document.querySelector("#password-form").addEventListener("submit",async(e)=>{e.preventDefault();const password=document.querySelector("#new-password").value;const {error}=await supabase.auth.updateUser({password});message(profileMessage,error?error.message:"Contraseña actualizada.",error?"#a25119":"#16804b");if(!error){document.querySelector("#new-password").value="";document.querySelector("#password-form").hidden=true;}});
    document.querySelector("#logout").addEventListener("click",async()=>{await supabase.auth.signOut();location.reload();});
    supabase.auth.getSession().then(({data:{session}})=>{if(session)showProfile(session);});
    supabase.auth.onAuthStateChange((event,session)=>{if(session){showProfile(session);if(event==="PASSWORD_RECOVERY"){document.querySelector("#password-form").hidden=false;message(profileMessage,"Elegí tu nueva contraseña.");}}});
  </script>
</body>
</html>
