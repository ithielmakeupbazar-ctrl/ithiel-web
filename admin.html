<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="Panel de administración con acceso seguro de Ithiel Bazar y Makeup.">
  <title>ITHIEL · Administración</title>
  <link rel="stylesheet" href="/styles/shared.css">
  <link rel="stylesheet" href="/styles/admin.css">
</head>
<body>
  <section id="loginView" class="login">
    <form id="loginForm" class="login-card">
      <a class="login-back" href="/">Catálogo</a>
      <div class="brand">ITHIEL</div>
      <p class="subtitle">Panel de administración</p>
      <label>Email<input id="email" type="email" autocomplete="email" required></label>
      <label>Contraseña<input id="password" type="password" autocomplete="current-password" required></label>
      <button class="primary" type="submit">Ingresar</button>
      <button id="googleLogin" class="google" type="button"><svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M21.6 12.23c0-.71-.06-1.23-.2-1.77H12v3.37h5.52c-.11.84-.7 2.1-2.01 2.95l-.02.11 2.92 2.26.2.02c1.84-1.7 2.99-4.2 2.99-6.94Z"/><path fill="#34A853" d="M12 22c2.7 0 4.97-.89 6.63-2.42l-3.16-2.4c-.85.59-1.99 1-3.47 1-2.65 0-4.9-1.74-5.7-4.16l-.1.01-3.03 2.35-.03.1A10 10 0 0 0 12 22Z"/><path fill="#FBBC05" d="M6.3 14.02A5.98 5.98 0 0 1 5.98 12c0-.7.12-1.37.31-2.02v-.13L3.23 7.47l-.1.05A10 10 0 0 0 2 12c0 1.61.38 3.14 1.13 4.47l3.17-2.45Z"/><path fill="#EA4335" d="M12 5.82c1.87 0 3.13.8 3.85 1.47l2.81-2.74C16.96 2.96 14.7 2 12 2a10 10 0 0 0-8.87 5.47l3.16 2.51C7.1 7.56 9.35 5.82 12 5.82Z"/></svg>Continuar con Google</button>
      <p id="loginNotice" class="notice" aria-live="polite"></p>
    </form>
  </section>

  <section id="appView" class="app hidden">
    <header>
      <div class="brand">ITHIEL</div>
      <div class="account"><a class="home-link" href="/">Catálogo</a><span id="accountEmail"></span><button id="logout" class="outline">Salir</button></div>
    </header>
    <main>
      <h1>Administración</h1>
      <p class="lead">Control de stock, pedidos y cupones.</p>
      <nav class="nav">
        <button data-view="dashboard" class="active">Resumen</button>
        <button data-view="products">Administrar catálogo</button>
        <button data-view="catalog">Categorías</button>
        <button data-view="coupons">Cupones</button>
        <button data-view="orders">Pedidos</button>
        <button data-view="customers">Clientes</button>
        <button data-view="account">Mi cuenta</button>
      </nav>
      <div id="content" class="panel"><p class="empty">Cargando…</p></div>
    </main>
  </section>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://bfuexiblfuqwykktltrp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_8-do7RGW8-li-7d1BnAsXQ_RYsks6iy";
    const ADMIN_API = `${SUPABASE_URL}/functions/v1/admin-api-v2`;
    const loginView = document.querySelector("#loginView");
    const appView = document.querySelector("#appView");
    const notice = document.querySelector("#loginNotice");
    const content = document.querySelector("#content");
    let supabase;
    let currentView = "dashboard";
    let activeSessionToken = "";

    function money(value) { return value === null || value === undefined || value === "" ? "—" : `$${Number(value).toLocaleString("es-AR")}`; }
    function escapeHtml(value) { return String(value ?? "").replace(/[&<>'\"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c])); }
    function statusLabel(status) { return ({ published:"Publicado", draft:"Borrador", archived:"Archivado", pending:"Pendiente", processing:"En proceso", completed:"Completado", cancelled:"Cancelado" })[status] || escapeHtml(status); }
    function setNotice(message = "") { notice.textContent = message; }
    function setLoading() { content.innerHTML = '<p class="empty">Cargando…</p>'; }
    function parseNumber(value) { const n = Number(String(value ?? "").replace(",", ".")); return Number.isFinite(n) ? n : 0; }
    function formatMoneyInput(value) { return value ? Number(value).toFixed(0) : ""; }
    function derivePrices(supplierValue, wholesaleValue, retailValue) {
      const supplier = parseNumber(supplierValue);
      let wholesale = parseNumber(wholesaleValue);
      let retail = parseNumber(retailValue);
      if (supplier > 0 && !wholesale) wholesale = supplier * 1.8;
      if (wholesale > 0 && !retail) retail = wholesale * 0.8;
      if (supplier > 0 && wholesale <= 0) wholesale = supplier * 1.8;
      if (wholesale > 0 && retail <= 0) retail = wholesale * 0.8;
      return { supplier, wholesale, retail };
    }
    function parseVariantInput() {
      return Array.from(document.querySelectorAll("[data-variant-row]"))
        .map((row) => {
          const color = row.querySelector("[data-variant-color]").value.trim();
          const size = row.querySelector("[data-variant-size]").value.trim();
          const imageField = row.querySelector("[data-variant-image]");
          const imageUrl = imageField ? imageField.value.trim() : "";
          const wholesale = row.querySelector("[data-variant-wholesale]").value.trim();
          const retail = row.querySelector("[data-variant-retail]").value.trim();
          if (!color && !size && !imageUrl && !wholesale && !retail) return null;
          return {
            color,
            size,
            imageUrl,
            wholesalePrice: wholesale ? Number(wholesale) : "",
            retailPrice: retail ? Number(retail) : "",
          };
        })
        .filter(Boolean);
    }
    function variantMarkup(variant = {}, imageOptions = []) {
      const imageField = imageOptions.length > 1
        ? `<select data-variant-image><option value="">Foto de variante</option>${imageOptions.map((src, index) => `<option value="${escapeHtml(src)}" ${variant.imageUrl === src ? "selected" : ""}>Foto ${index + 1}</option>`).join("")}</select>`
        : `<input data-variant-image type="url" placeholder="URL imagen opcional" value="${escapeHtml(variant.imageUrl || "")}">`;
      return `<div class="variant-row" data-variant-row>
        <input data-variant-color type="text" placeholder="Color" value="${escapeHtml(variant.color || "")}">
        <input data-variant-size type="text" placeholder="Talle" value="${escapeHtml(variant.size || "")}">
        ${imageField}
        <input data-variant-wholesale type="number" min="1" placeholder="Mayorista" value="${escapeHtml(variant.wholesalePrice || "")}">
        <input data-variant-retail type="number" min="1" placeholder="Minorista" value="${escapeHtml(variant.retailPrice || "")}">
        <button class="edit delete variant-remove" type="button" data-remove-variant>Quitar</button>
      </div>`;
    }
    function wirePriceSync() {
      const supplier = document.querySelector("#productSupplier");
      const wholesale = document.querySelector("#productWholesale");
      const retail = document.querySelector("#productRetail");
      const sync = (source) => {
        const supplierValue = parseNumber(supplier.value);
        const wholesaleValue = parseNumber(wholesale.value);
        const retailValue = parseNumber(retail.value);
        if (source === "supplier" && supplierValue > 0) {
          wholesale.value = formatMoneyInput(supplierValue * 1.8);
          retail.value = formatMoneyInput(supplierValue * 1.8 * 0.8);
          return;
        }
        if (source === "wholesale" && wholesaleValue > 0) {
          if (!supplierValue) supplier.value = formatMoneyInput(wholesaleValue / 1.8);
          retail.value = formatMoneyInput(wholesaleValue * 0.8);
          return;
        }
        if (source === "retail" && retailValue > 0 && !wholesaleValue && !supplierValue) {
          wholesale.value = formatMoneyInput(retailValue / 0.8);
        }
      };
      const initialize = () => {
        const supplierValue = parseNumber(supplier.value);
        const wholesaleValue = parseNumber(wholesale.value);
        const retailValue = parseNumber(retail.value);
        if (supplierValue > 0) {
          sync("supplier");
          return;
        }
        if (wholesaleValue > 0) {
          sync("wholesale");
          return;
        }
        if (retailValue > 0) {
          sync("retail");
        }
      };
      supplier.addEventListener("input", () => sync("supplier"));
      supplier.addEventListener("blur", () => sync("supplier"));
      wholesale.addEventListener("input", () => sync("wholesale"));
      wholesale.addEventListener("blur", () => sync("wholesale"));
      retail.addEventListener("input", () => sync("retail"));
      retail.addEventListener("blur", () => sync("retail"));
      initialize();
    }

    async function callAdmin(action, payload = {}) {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) throw new Error("Tu sesión venció. Volvé a ingresar.");
      const response = await fetch(ADMIN_API, {
        method: "POST",
        headers: { "Content-Type":"application/json", apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${session.access_token}` },
        body: JSON.stringify({ action, ...payload }),
      });
      const result = await response.json();
      if (!response.ok) throw new Error(result.error || "No se pudo cargar la información.");
      return result.data;
    }

    function renderDashboard(data) {
      const t = data.totals;
      content.innerHTML = `
        <div class="cards">
          <article class="card"><small>Productos</small><strong>${t.products}</strong></article>
          <article class="card"><small>Stock bajo</small><strong>${t.lowStock}</strong></article>
          <article class="card"><small>Pedidos pendientes</small><strong>${t.pendingOrders}</strong></article>
          <article class="card"><small>En proceso</small><strong>${t.processingOrders}</strong></article>
          <article class="card"><small>Cupones activos</small><strong>${t.activeCoupons}</strong></article>
        </div>
        <section class="panel"><h2>Alerta de stock bajo</h2>
          ${data.alerts.length ? `<table><thead><tr><th>Producto</th><th>SKU</th><th>Stock</th><th>Estado</th></tr></thead><tbody>${data.alerts.map(p => `<tr><td>${escapeHtml(p.name)}</td><td>${escapeHtml(p.sku)}</td><td><span class="pill low">${p.stock}</span></td><td>${escapeHtml(p.status)}</td></tr>`).join("")}</tbody></table>` : '<p class="empty">No hay productos con stock bajo.</p>'}
        </section>`;
    }

    async function renderProductForm(product = null) {
      const options = await callAdmin("catalogOptions");
      const categoryOptions = ['<option value="">Elegir categoría</option>', ...options.categories.map(c => `<option value="${c.id}" ${product?.category_id === c.id ? "selected" : ""}>${escapeHtml(c.name)}</option>`)].join("");
      const existingVariants = Array.isArray(product?.variants) ? product.variants : [];
      const imageOptions = product?.product_images?.map((image) => image.image_url) || [];
      const existingImages = product?.product_images?.length ? `<div class="wide"><label>Fotos actuales</label><div class="product-photos">${product.product_images.map(image => `<div class="product-photo"><img src="${escapeHtml(image.image_url)}" alt=""><button class="edit" type="button" data-delete-image="${image.id}">Quitar</button></div>`).join("")}</div></div>` : "";
      const variantList = existingVariants.length ? existingVariants.map((variant) => variantMarkup({
        color: variant.color || "",
        size: variant.size || "",
        imageUrl: variant.image_url || variant.imageUrl || "",
        wholesalePrice: variant.wholesale_price || variant.wholesalePrice || "",
        retailPrice: variant.retail_price || variant.retailPrice || "",
      }, imageOptions)).join("") : variantMarkup({}, imageOptions);
      content.innerHTML = `<section class="panel"><div class="actions"><button id="backProducts" class="outline" type="button">← Volver a productos</button></div>
        <h2>${product ? "Editar producto" : "Nuevo producto"}</h2>
        <form id="productForm" class="product-form">
          <div class="upload-card wide">
            <div class="upload-head">
              <div>
                <h3>Fotos</h3>
                <p>Subí una o varias imágenes. La primera queda como principal.</p>
              </div>
              <input id="productPhoto" type="file" accept="image/jpeg,image/png,image/webp" multiple hidden>
              <button class="outline" type="button" id="pickPhotos">Elegir archivos</button>
            </div>
            <div id="photoPreview" class="photo-preview"><div class="preview-empty">Todavía no subiste imágenes.</div></div>
          </div>
          ${existingImages}
          <label class="wide">Nombre<input id="productName" required maxlength="180" value="${escapeHtml(product?.name || "")}"></label>
          <label class="wide">Descripción<textarea id="productDescription" rows="3" maxlength="1500">${escapeHtml(product?.description || "")}</textarea></label>
          <label>Categoría<select id="productCategory" required>${categoryOptions}</select></label>
          <label>Subcategoría<select id="productSubcategory"><option value="">Sin subcategoría</option></select></label>
          <label class="price-field">Precio proveedor<input id="productSupplier" type="number" min="1" value="${product?.supplier_price || ""}" placeholder="Opcional"></label>
          <label class="price-field">Precio mayorista<input id="productWholesale" type="number" min="1" value="${product?.wholesale_price || ""}"></label>
          <label class="price-field">Precio minorista<input id="productRetail" type="number" min="1" value="${product?.retail_price || ""}"></label>
          <label>Stock<input id="productStock" type="number" min="0" required value="${product?.stock ?? 30}"></label>
          <label>Estado<select id="productStatus"><option value="published" ${product?.status === "published" ? "selected" : ""}>Publicado</option><option value="draft" ${product?.status === "draft" ? "selected" : ""}>Borrador</option><option value="archived" ${product?.status === "archived" ? "selected" : ""}>Archivado</option></select></label>
          <div class="wide variants-card">
            <div class="variants-head">
              <div>
                <h3>Variantes</h3>
                <p>Agregá colores, talles e imagen por variante si hace falta.</p>
              </div>
              <button id="addVariant" class="outline" type="button">+ Agregar variante</button>
            </div>
            <div id="variantList" class="variant-list">${variantList}</div>
          </div>
          <div class="wide"><button class="primary" type="submit">${product ? "Guardar cambios" : "Crear producto"}</button></div>
        </form><p id="productMessage" class="notice"></p>
      </section>`;
      const category = document.querySelector("#productCategory");
      const subcategory = document.querySelector("#productSubcategory");
      const photoInput = document.querySelector("#productPhoto");
      const pickPhotos = document.querySelector("#pickPhotos");
      const preview = document.querySelector("#photoPreview");
      const variantListNode = document.querySelector("#variantList");
      let selectedImageUrls = imageOptions.slice();
      const fillSubcategories = () => {
        const selected = category.value;
        subcategory.innerHTML = '<option value="">Sin subcategoría</option>' + options.subcategories.filter(s => s.category_id === selected).map(s => `<option value="${s.id}" ${product?.subcategory_id === s.id ? "selected" : ""}>${escapeHtml(s.name)}</option>`).join("");
      };
      category.addEventListener("change", () => { product = { ...product, subcategory_id:"" }; fillSubcategories(); });
      fillSubcategories();
      wirePriceSync();
      pickPhotos.addEventListener("click", () => photoInput.click());
      photoInput.addEventListener("change", () => {
        const files = Array.from(photoInput.files || []);
        selectedImageUrls = files.map((file, index) => `__local__${index}:${file.name}`);
        preview.innerHTML = files.length
          ? `<div class="preview-empty">Archivo cargado (${files.length})</div>`
          : '<div class="preview-empty">Todavía no subiste imágenes.</div>';
        wireVariantImageSelects();
      });
      document.querySelector("#addVariant").addEventListener("click", () => {
        variantListNode.insertAdjacentHTML("beforeend", variantMarkup({}, selectedImageUrls));
        wireVariantButtons();
        wireVariantImageSelects();
      });
      function wireVariantButtons() {
        document.querySelectorAll("[data-remove-variant]").forEach((button) => button.addEventListener("click", () => {
          const rows = document.querySelectorAll("[data-variant-row]");
          if (rows.length === 1) {
            rows[0].querySelectorAll("input").forEach((input) => input.value = "");
            return;
          }
          button.closest("[data-variant-row]").remove();
        }));
      }
      function wireVariantImageSelects() {
        document.querySelectorAll("[data-variant-row]").forEach((row) => {
          const imageCell = row.querySelector("[data-variant-image]");
          if (!imageCell || imageCell.tagName !== "SELECT") return;
          const current = imageCell.value;
          imageCell.innerHTML = `<option value="">Foto de variante</option>${selectedImageUrls.map((src, index) => `<option value="${escapeHtml(src)}" ${current === src ? "selected" : ""}>Foto ${index + 1}</option>`).join("")}`;
        });
      }
      wireVariantButtons();
      wireVariantImageSelects();
      document.querySelector("#backProducts").addEventListener("click", () => loadView("products"));
      document.querySelectorAll("[data-delete-image]").forEach(button => button.addEventListener("click", async () => {
        if (!confirm("¿Quitar esta foto del producto?")) return;
        try {
          await callAdmin("deleteProductImage", { imageId: button.dataset.deleteImage });
          const products = await callAdmin("products");
          await renderProductForm(products.find(item => item.id === product.id));
        } catch (error) { alert(error.message); }
      }));
      document.querySelector("#productForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = document.querySelector("#productMessage"); message.className = "notice is-muted"; message.textContent = "Guardando…";
        try {
          const variants = parseVariantInput();
          const result = await callAdmin("saveProduct", {
            id: product?.id || "", name: document.querySelector("#productName").value, description: document.querySelector("#productDescription").value,
            categoryId: category.value, subcategoryId: subcategory.value,
            supplierPrice: document.querySelector("#productSupplier").value,
            retailPrice: document.querySelector("#productRetail").value,
            wholesalePrice: document.querySelector("#productWholesale").value,
            stock: document.querySelector("#productStock").value, status: document.querySelector("#productStatus").value,
            variants,
          });
          const photos = Array.from(photoInput.files || []);
          for (const photo of photos) {
            const dataUrl = await new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = () => resolve(reader.result); reader.onerror = reject; reader.readAsDataURL(photo); });
            await callAdmin("uploadProductImage", { productId: result.id, dataUrl });
          }
          message.className = "notice is-success"; message.textContent = result.created ? "Producto creado." : "Producto actualizado.";
          setTimeout(() => loadView("products"), 550);
        } catch (error) { message.className = "notice is-error"; message.textContent = error.message; }
      });
    }

    function renderProducts(products) {
      const allStatuses = ["Todos","published","draft","archived"];
      const statusLabels = { Todos:"Todos", published:"Publicado", draft:"Borrador", archived:"Archivado" };
      const categories = [...new Set(products.map((item) => item.categories?.name || item.category || "Sin categoría"))];
      const filterButtons = (items, selected, key, labels = null) => items.map((item) => `<button type="button" class="${key}-filter ${selected === item ? "active" : ""}" data-${key}="${escapeHtml(item)}">${escapeHtml(labels?.[item] || item)}</button>`).join("");
      const rows = (items) => items.length ? `<table><thead><tr><th>Foto</th><th>Producto</th><th>SKU</th><th>Minorista</th><th>Mayorista</th><th>Stock</th><th>Estado</th><th>Acción</th></tr></thead><tbody>${items.map(p => `<tr><td>${p.product_images?.[0]?.image_url ? `<img class="photo-thumb" src="${escapeHtml(p.product_images[0].image_url)}" alt="">` : "—"}</td><td>${escapeHtml(p.name)}</td><td>${escapeHtml(p.sku)}</td><td>${money(p.retail_price)}</td><td>${money(p.wholesale_price)}</td><td><span class="pill ${Number(p.stock) <= 5 ? "low" : ""}">${p.stock}</span></td><td><span class="status-pill" data-status="${escapeHtml(p.status)}">${statusLabel(p.status)}</span></td><td><div class="row-actions"><button class="edit" data-edit-product="${p.id}">Editar</button><button class="edit delete" type="button" data-delete-product="${p.id}" aria-label="Eliminar ${escapeHtml(p.name)}" title="Eliminar producto">🗑</button></div></td></tr>`).join("")}</tbody></table>` : '<p class="empty">No encontramos productos.</p>';
      content.innerHTML = `<section class="panel"><div class="actions"><button id="newProduct" class="primary" type="button">+ Nuevo producto</button></div><h2>Administrar catálogo (${products.length})</h2><div class="product-filters"><input id="productSearch" class="product-search" type="search" placeholder="Buscar por nombre, SKU, categoría o estado…"><div class="filter-row"><div class="filter-group">${filterButtons(allStatuses, "Todos", "status", statusLabels)}</div><div class="filter-group">${filterButtons(["Todos", ...categories], "Todos", "category")}</div></div></div><div id="productRows">${rows(products)}</div></section>`;
      document.querySelector("#newProduct").addEventListener("click", async (event) => {
        event.preventDefault();
        event.stopPropagation();
        try { await renderProductForm(); }
        catch (error) { showProductError(error); }
      });
      const wireRows = () => { document.querySelectorAll("[data-edit-product]").forEach(button => button.addEventListener("click", async (event) => {
        event.preventDefault();
        event.stopPropagation();
        try { await renderProductForm(products.find(p => p.id === button.dataset.editProduct)); }
        catch (error) { showProductError(error); }
      }));
      document.querySelectorAll("[data-delete-product]").forEach(button => button.addEventListener("click", async () => {
        const product = products.find(p => p.id === button.dataset.deleteProduct);
        if (!confirm(`¿Eliminar definitivamente “${product?.name || "este producto"}”? Esta acción no se puede deshacer.`)) return;
        try { await callAdmin("deleteProduct", { productId: button.dataset.deleteProduct }); await loadView("products"); }
        catch (error) { alert(error.message); }
      })); };
      let selectedStatus = "Todos";
      let selectedCategory = "Todos";
      const applyFilters = () => {
        const term = document.querySelector("#productSearch").value.trim().toLocaleLowerCase("es-AR");
        const filtered = products.filter((p) => {
          const category = p.categories?.name || p.category || "Sin categoría";
          const text = `${p.name} ${p.sku} ${p.status} ${category} ${p.subcategories?.name || ""}`.toLocaleLowerCase("es-AR");
          const statusMatch = selectedStatus === "Todos" || p.status === selectedStatus;
          const categoryMatch = selectedCategory === "Todos" || category === selectedCategory;
          return statusMatch && categoryMatch && text.includes(term);
        });
        document.querySelector("#productRows").innerHTML = rows(filtered);
        wireRows();
      };
      wireRows();
      document.querySelector("#productSearch").addEventListener("input", applyFilters);
      document.querySelectorAll("[data-status]").forEach((button) => button.addEventListener("click", () => { selectedStatus = button.dataset.status; document.querySelectorAll("[data-status]").forEach((item) => item.classList.toggle("active", item.dataset.status === selectedStatus)); applyFilters(); }));
      document.querySelectorAll("[data-category]").forEach((button) => button.addEventListener("click", () => { selectedCategory = button.dataset.category; document.querySelectorAll("[data-category]").forEach((item) => item.classList.toggle("active", item.dataset.category === selectedCategory)); applyFilters(); }));
    }

    function showProductError(error) {
      content.innerHTML = `<section class="panel"><h2>No se pudo abrir el editor</h2><p class="empty">${escapeHtml(error.message || "Actualizá la función admin-api y probá nuevamente.")}</p><button class="outline" id="backProductsError" type="button">← Volver a productos</button></section>`;
      document.querySelector("#backProductsError").addEventListener("click", () => loadView("products"));
    }

    function orderActions(order) {
      if (order.status === "pending") return `<button class="edit" data-order-status="processing" data-order-id="${order.id}">En proceso</button><button class="edit" data-order-status="cancelled" data-order-id="${order.id}">Cancelar</button>`;
      if (order.status === "processing") return `<button class="edit" data-order-status="completed" data-order-id="${order.id}">Completar</button><button class="edit" data-order-status="cancelled" data-order-id="${order.id}">Cancelar</button>`;
      return "—";
    }

    function renderOrders(orders) {
      content.innerHTML = `<section class="panel"><h2>Últimos pedidos</h2>
        ${orders.length ? `<table><thead><tr><th>N°</th><th>Cliente</th><th>Tipo</th><th>Entrega</th><th>Total</th><th>Estado</th><th>Fecha</th><th>Acción</th></tr></thead><tbody>${orders.map(o => `<tr><td>#${escapeHtml(o.order_number)}</td><td>${escapeHtml(o.customers?.full_name || "Sin registro")}<br><small>${escapeHtml(o.customers?.phone || "")}</small></td><td>${o.purchase_type === "wholesale" ? "Mayorista" : "Minorista"}</td><td>${o.fulfillment_type === "shipping" ? "Envío" : "Retiro"}</td><td>${money(o.total)}</td><td><span class="pill">${statusLabel(o.status)}</span></td><td>${new Date(o.created_at).toLocaleDateString("es-AR")}</td><td>${orderActions(o)}</td></tr>`).join("")}</tbody></table>` : '<p class="empty">Todavía no hay pedidos registrados.</p>'}
      </section>`;
      document.querySelectorAll("[data-order-status]").forEach(button => button.addEventListener("click", async () => {
        const status = button.dataset.orderStatus;
        const action = status === "completed" ? "completar" : status === "processing" ? "pasar a En proceso" : "cancelar";
        if (!confirm(`¿Querés ${action} este pedido?`)) return;
        try { await callAdmin("updateOrderStatus", { orderId: button.dataset.orderId, status }); await loadView("orders"); }
        catch (error) { alert(error.message); }
      }));
    }

    function renderCustomers(customers) {
      content.innerHTML = `<section class="panel"><h2>Clientes</h2>
        <form id="customerForm" class="customer-form">
          <label>Nombre<input id="customerName" required maxlength="100" placeholder="Nombre y apellido"></label>
          <label>WhatsApp<input id="customerPhone" required inputmode="numeric" placeholder="5493411234567"></label>
          <label class="check"><input id="customerConsent" type="checkbox"> Acepta novedades</label>
          <button class="primary" type="submit">Guardar cliente</button>
        </form>
        <div id="customerMessage" class="notice"></div>
        ${customers.length ? `<table><thead><tr><th>Cliente</th><th>WhatsApp</th><th>Novedades</th><th>Alta</th><th>Acción</th></tr></thead><tbody>${customers.map(c => `<tr><td>${escapeHtml(c.full_name)}</td><td>+${escapeHtml(c.phone)}</td><td>${c.whatsapp_opt_in ? '<span class="pill">Sí</span>' : 'No'}</td><td>${new Date(c.created_at).toLocaleDateString("es-AR")}</td><td><button class="edit delete" type="button" data-delete-customer="${c.id}" aria-label="Eliminar ${escapeHtml(c.full_name)}" title="Eliminar cliente">🗑</button></td></tr>`).join("")}</tbody></table>` : '<p class="empty">Todavía no hay clientes registrados.</p>'}
      </section>`;
      document.querySelector("#customerForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = document.querySelector("#customerMessage");
        message.textContent = "Guardando…";
        try {
          const result = await callAdmin("createCustomer", {
            fullName: document.querySelector("#customerName").value,
            phone: document.querySelector("#customerPhone").value,
            whatsappOptIn: document.querySelector("#customerConsent").checked,
          });
          message.className = "notice is-success";
          message.textContent = result.created ? "Cliente registrado." : "Cliente actualizado.";
          await loadView("customers");
        } catch (error) {
          message.className = "notice is-error";
          message.textContent = error.message;
        }
      });
      document.querySelectorAll("[data-delete-customer]").forEach(button => button.addEventListener("click", async () => {
        const customer = customers.find(c => c.id === button.dataset.deleteCustomer);
        if (!confirm(`¿Eliminar definitivamente a “${customer?.full_name || "esta cliente"}”? Esta acción no se puede deshacer.`)) return;
        try { await callAdmin("deleteCustomer", { customerId: button.dataset.deleteCustomer }); await loadView("customers"); }
        catch (error) { alert(error.message); }
      }));
    }

    function renderCatalog(data) {
      const categories = data.categories || [];
      const subcategories = data.subcategories || [];
      const categoryName = (id) => categories.find(c => c.id === id)?.name || "Sin categoría";
      const categoryOptions = categories.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join("");
      content.innerHTML = `<section class="panel"><h2>Categorías y subcategorías</h2>
        <p class="lead">Podés renombrar, desactivar o eliminar. Para eliminar, no debe tener productos asociados.</p>
        <div class="catalog-tools">
          <form id="newCategoryForm"><label>Nueva categoría<input id="newCategoryName" maxlength="100" required placeholder="Ej.: Makeup"></label><button class="primary" type="submit">Agregar</button></form>
          <form id="newSubcategoryForm"><label>Subcategoría<input id="newSubcategoryName" maxlength="100" required placeholder="Ej.: Labiales"></label><label>Categoría<select id="newSubcategoryCategory" required>${categoryOptions}</select></label><button class="primary" type="submit">Agregar</button></form>
        </div>
        <h2>Categorías</h2>
        ${categories.length ? `<table><thead><tr><th>Nombre</th><th>Estado</th><th>Acción</th></tr></thead><tbody>${categories.map(c => `<tr><td>${escapeHtml(c.name)}</td><td><span class="pill">${c.active ? "Activa" : "Inactiva"}</span></td><td><button class="edit" data-edit-category="${c.id}">Editar</button><button class="edit" data-toggle-category="${c.id}">${c.active ? "Desactivar" : "Activar"}</button><button class="edit delete" data-delete-category="${c.id}" title="Eliminar categoría">🗑</button></td></tr>`).join("")}</tbody></table>` : '<p class="empty">No hay categorías.</p>'}
        <h2 class="section-spaced">Subcategorías</h2>
        ${subcategories.length ? `<table><thead><tr><th>Subcategoría</th><th>Categoría</th><th>Estado</th><th>Acción</th></tr></thead><tbody>${subcategories.map(s => `<tr><td>${escapeHtml(s.name)}</td><td>${escapeHtml(categoryName(s.category_id))}</td><td><span class="pill">${s.active ? "Activa" : "Inactiva"}</span></td><td><button class="edit" data-edit-subcategory="${s.id}">Editar</button><button class="edit" data-toggle-subcategory="${s.id}">${s.active ? "Desactivar" : "Activar"}</button><button class="edit delete" data-delete-subcategory="${s.id}" title="Eliminar subcategoría">🗑</button></td></tr>`).join("")}</tbody></table>` : '<p class="empty">No hay subcategorías.</p>'}
      </section>`;
      const refresh = () => loadView("catalog");
      document.querySelector("#newCategoryForm").addEventListener("submit", async (event) => { event.preventDefault(); try { await callAdmin("saveCategory", { name: document.querySelector("#newCategoryName").value }); refresh(); } catch (error) { alert(error.message); } });
      document.querySelector("#newSubcategoryForm").addEventListener("submit", async (event) => { event.preventDefault(); try { await callAdmin("saveSubcategory", { name: document.querySelector("#newSubcategoryName").value, categoryId: document.querySelector("#newSubcategoryCategory").value }); refresh(); } catch (error) { alert(error.message); } });
      document.querySelectorAll("[data-edit-category]").forEach(button => button.addEventListener("click", async () => { const item = categories.find(c => c.id === button.dataset.editCategory); const name = prompt("Nombre de la categoría:", item.name); if (name === null) return; try { await callAdmin("saveCategory", { categoryId:item.id, name, active:item.active }); refresh(); } catch (error) { alert(error.message); } }));
      document.querySelectorAll("[data-toggle-category]").forEach(button => button.addEventListener("click", async () => { const item = categories.find(c => c.id === button.dataset.toggleCategory); try { await callAdmin("saveCategory", { categoryId:item.id, name:item.name, active:!item.active }); refresh(); } catch (error) { alert(error.message); } }));
      document.querySelectorAll("[data-delete-category]").forEach(button => button.addEventListener("click", async () => { const item = categories.find(c => c.id === button.dataset.deleteCategory); if (!confirm(`¿Eliminar la categoría “${item.name}”? Primero debe estar sin productos ni subcategorías.`)) return; try { await callAdmin("deleteCategory", { categoryId:item.id }); refresh(); } catch (error) { alert(error.message); } }));
      document.querySelectorAll("[data-edit-subcategory]").forEach(button => button.addEventListener("click", async () => { const item = subcategories.find(s => s.id === button.dataset.editSubcategory); const name = prompt("Nombre de la subcategoría:", item.name); if (name === null) return; const category = prompt(`Categoría (${categories.map(c => c.name).join(", ")}):`, categoryName(item.category_id)); if (category === null) return; const match = categories.find(c => c.name.toLocaleLowerCase("es-AR") === category.trim().toLocaleLowerCase("es-AR")); if (!match) return alert("Elegí una categoría existente."); try { await callAdmin("saveSubcategory", { subcategoryId:item.id, name, categoryId:match.id, active:item.active }); refresh(); } catch (error) { alert(error.message); } }));
      document.querySelectorAll("[data-toggle-subcategory]").forEach(button => button.addEventListener("click", async () => { const item = subcategories.find(s => s.id === button.dataset.toggleSubcategory); try { await callAdmin("saveSubcategory", { subcategoryId:item.id, name:item.name, categoryId:item.category_id, active:!item.active }); refresh(); } catch (error) { alert(error.message); } }));
      document.querySelectorAll("[data-delete-subcategory]").forEach(button => button.addEventListener("click", async () => { const item = subcategories.find(s => s.id === button.dataset.deleteSubcategory); if (!confirm(`¿Eliminar la subcategoría “${item.name}”? No debe tener productos asociados.`)) return; try { await callAdmin("deleteSubcategory", { subcategoryId:item.id }); refresh(); } catch (error) { alert(error.message); } }));
    }

    function renderCoupons(coupons) {
      const items = Array.isArray(coupons) ? coupons : coupons?.coupons || [];
      const normalizeDate = (value) => value ? new Intl.DateTimeFormat("en-CA", { timeZone:"America/Argentina/Buenos_Aires", year:"numeric", month:"2-digit", day:"2-digit" }).format(new Date(value)) : "";
      const discountLabel = (coupon) => `${Number(coupon.discount_percent || 0)}%`;
      const validity = (coupon) => {
        const start = coupon.starts_at ? new Date(coupon.starts_at).toLocaleDateString("es-AR") : "Ahora";
        const end = coupon.expires_at ? new Date(coupon.expires_at).toLocaleDateString("es-AR") : "Sin vencimiento";
        return `${start} → ${end}`;
      };
      const rows = () => items.length ? `<table><thead><tr><th>Código</th><th>Descuento</th><th>Vigencia</th><th>Estado</th><th>Acción</th></tr></thead><tbody>${items.map(coupon => `<tr>
        <td><strong>${escapeHtml(coupon.code)}</strong></td>
        <td>${discountLabel(coupon)}</td>
        <td>${escapeHtml(validity(coupon))}</td>
        <td><span class="pill ${coupon.active ? "" : "low"}">${coupon.active ? "Activo" : "Inactivo"}</span></td>
        <td><button class="edit" type="button" data-edit-coupon="${coupon.id}">Editar</button><button class="edit" type="button" data-toggle-coupon="${coupon.id}">${coupon.active ? "Desactivar" : "Activar"}</button><button class="edit delete" type="button" data-delete-coupon="${coupon.id}" title="Eliminar cupón">🗑</button></td>
      </tr>`).join("")}</tbody></table>` : '<p class="empty">Todavía no hay cupones creados.</p>';

      content.innerHTML = `<section class="panel"><h2>Cupones de descuento</h2>
        <p class="lead">Creá códigos porcentuales y definí durante qué período pueden usarse en el carrito.</p>
        <form id="couponForm" class="coupon-form">
          <input id="couponId" type="hidden">
          <label>Código<input id="couponCode" required maxlength="40" autocomplete="off" placeholder="Ej.: BIENVENIDA10"></label>
          <label>Descuento (%)<input id="couponValue" type="number" min="1" max="100" step="1" required placeholder="10"></label>
          <label>Desde<input id="couponStartsAt" type="date" required></label>
          <label>Hasta<input id="couponExpiresAt" type="date" required></label>
          <label class="check coupon-active"><input id="couponActive" type="checkbox" checked> Cupón activo</label>
          <div class="coupon-form-actions"><button class="primary" type="submit">Guardar cupón</button><button id="cancelCouponEdit" class="outline hidden" type="button">Cancelar edición</button></div>
        </form>
        <p id="couponMessage" class="notice" aria-live="polite"></p>
        <div id="couponRows" class="coupon-table">${rows()}</div>
      </section>`;

      const form = document.querySelector("#couponForm");
      const message = document.querySelector("#couponMessage");
      const cancel = document.querySelector("#cancelCouponEdit");
      const resetForm = () => {
        form.reset();
        document.querySelector("#couponId").value = "";
        document.querySelector("#couponActive").checked = true;
        cancel.classList.add("hidden");
        message.textContent = "";
      };
      const editCoupon = (coupon) => {
        document.querySelector("#couponId").value = coupon.id;
        document.querySelector("#couponCode").value = coupon.code || "";
        document.querySelector("#couponValue").value = coupon.discount_percent || "";
        document.querySelector("#couponStartsAt").value = normalizeDate(coupon.starts_at);
        document.querySelector("#couponExpiresAt").value = normalizeDate(coupon.expires_at);
        document.querySelector("#couponActive").checked = Boolean(coupon.active);
        cancel.classList.remove("hidden");
        form.scrollIntoView({ behavior:"smooth", block:"start" });
      };
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const value = Number(document.querySelector("#couponValue").value);
        const startsAt = document.querySelector("#couponStartsAt").value;
        const expiresAt = document.querySelector("#couponExpiresAt").value;
        if (value > 100) { message.className = "notice is-error"; message.textContent = "El porcentaje no puede superar 100%."; return; }
        if (expiresAt <= startsAt) { message.className = "notice is-error"; message.textContent = "El vencimiento debe ser posterior al inicio."; return; }
        message.className = "notice is-muted"; message.textContent = "Guardando cupón…";
        try {
          await callAdmin("saveCoupon", {
            couponId: document.querySelector("#couponId").value,
            code: document.querySelector("#couponCode").value.trim().toUpperCase(),
            discountPercent: value,
            startsAt,
            expiresAt,
            active: document.querySelector("#couponActive").checked,
          });
          message.className = "notice is-success"; message.textContent = "Cupón guardado.";
          setTimeout(() => loadView("coupons"), 450);
        } catch (error) { message.className = "notice is-error"; message.textContent = error.message; }
      });
      cancel.addEventListener("click", resetForm);
      document.querySelectorAll("[data-edit-coupon]").forEach(button => button.addEventListener("click", () => editCoupon(items.find(coupon => coupon.id === button.dataset.editCoupon))));
      document.querySelectorAll("[data-toggle-coupon]").forEach(button => button.addEventListener("click", async () => {
        const coupon = items.find(item => item.id === button.dataset.toggleCoupon);
        try { await callAdmin("saveCoupon", {
          couponId:coupon.id, code:coupon.code, discountPercent:coupon.discount_percent,
          startsAt:normalizeDate(coupon.starts_at), expiresAt:normalizeDate(coupon.expires_at), active:!coupon.active,
        }); await loadView("coupons"); }
        catch (error) { alert(error.message); }
      }));
      document.querySelectorAll("[data-delete-coupon]").forEach(button => button.addEventListener("click", async () => {
        const coupon = items.find(item => item.id === button.dataset.deleteCoupon);
        if (!confirm(`¿Eliminar definitivamente el cupón “${coupon?.code || ""}”?`)) return;
        try { await callAdmin("deleteCoupon", { couponId:button.dataset.deleteCoupon }); await loadView("coupons"); }
        catch (error) { alert(error.message); }
      }));
    }

    async function renderAccount() {
      const { data: { session } } = await supabase.auth.getSession();
      content.innerHTML = `<section class="panel"><h2>Mi cuenta administradora</h2>
        <p class="empty">Sesión iniciada con: ${escapeHtml(session?.user?.email || "")}</p>
        <button id="sendPasswordReset" class="outline" type="button">Recibir email para cambiar contraseña</button>
        <p id="adminAccountMessage" class="notice"></p>
      </section>`;
      document.querySelector("#sendPasswordReset").addEventListener("click", async () => {
        const message = document.querySelector("#adminAccountMessage");
        message.className = "notice is-muted"; message.textContent = "Enviando email…";
        const { error } = await supabase.auth.resetPasswordForEmail(session.user.email, { redirectTo: `${window.location.origin}/cuenta.html` });
        if (error) { message.className = "notice is-error"; message.textContent = error.message; return; }
        message.className = "notice is-success"; message.textContent = "Te enviamos un email para cambiar tu contraseña.";
      });
    }

    async function loadView(view) {
      currentView = view;
      document.querySelectorAll(".nav button").forEach(button => button.classList.toggle("active", button.dataset.view === view));
      setLoading();
      try {
        if (view === "account") { await renderAccount(); return; }
        const data = await callAdmin(view === "catalog" ? "catalogManagement" : view);
        if (view === "dashboard") renderDashboard(data);
        if (view === "products") renderProducts(data);
        if (view === "orders") renderOrders(data);
        if (view === "customers") renderCustomers(data);
        if (view === "catalog") renderCatalog(data);
        if (view === "coupons") renderCoupons(data);
      } catch (error) {
        content.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
      }
    }

    async function showApp(session) {
      const token = session?.access_token || "";
      if (token && token === activeSessionToken) return;
      activeSessionToken = token;
      document.querySelector("#accountEmail").textContent = session.user.email || "Cuenta administradora";
      loginView.classList.add("hidden");
      appView.classList.remove("hidden");
      await loadView(currentView);
    }

    function setup() {
      if (SUPABASE_ANON_KEY.startsWith("PEGAR_AQUI")) {
        setNotice("Falta configurar la clave pública de Supabase.");
        return;
      }
      supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      supabase.auth.getSession().then(({ data: { session } }) => { if (session) showApp(session); });
      supabase.auth.onAuthStateChange((event, session) => {
        if (!session) {
          activeSessionToken = "";
          return;
        }
        if (event === "SIGNED_IN" || event === "TOKEN_REFRESHED" || event === "INITIAL_SESSION") showApp(session);
      });
    }

    document.querySelector("#loginForm").addEventListener("submit", async (event) => {
      event.preventDefault(); setNotice("");
      const email = document.querySelector("#email").value.trim();
      const password = document.querySelector("#password").value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) setNotice("No se pudo ingresar. Revisá email y contraseña.");
    });
    document.querySelector("#googleLogin").addEventListener("click", async () => {
      setNotice("");
      const { error } = await supabase.auth.signInWithOAuth({ provider:"google", options:{ redirectTo:`${window.location.origin}/admin.html` } });
      if (error) setNotice("No se pudo iniciar con Google.");
    });
    document.querySelector("#logout").addEventListener("click", () => supabase.auth.signOut().then(() => location.reload()));
    document.querySelectorAll(".nav button").forEach(button => button.addEventListener("click", (event) => {
      event.preventDefault();
      loadView(button.dataset.view);
    }));
    setup();
  </script>
</body>
</html>
